<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <link rel="stylesheet" href="../../css/examples.css" />
        <style>
            #mouseLine {
                width: 85%;
                height: 500px;
                position: relative;
            }
        </style>
    </head>
    <body>
        <div class="page-title">全局剖切面</div>

        <div class="content-title">效果展示</div>

        <div id="mouseLine">
            <div class="demo-btns">
                <button onclick="updateClip()">更新剖切面</button>
                <button onclick="deleteClip()">删除剖切面</button>
            </div>
        </div>

        <div class="content-title">初始化模型剖切API说明</div>
        <div class="api-code">
            initModelClip(model: Object3D, axis: string, constant: number)
        </div>
        <div class="api-param"> model - 被剖切的模型</div>
        <div class="api-param">axis - 剖切轴</div>
        <div class="api-param">constant - 剖切面位置</div>

        <div class="content-title">更新模型剖切API说明</div>
        <div class="api-code">
            updateModelClip(constant: number)
        </div>
        <div class="api-param">constant - 更新剖切位置</div>

        <div class="content-title">删除模型剖切API说明</div>
        <div class="api-code">
            deleteModelClip()
        </div>



        <div class="content-title">案例代码</div>
        <pre id="codeShow"></pre>

        <script src="../../../js/thingorigin.js"></script>
        <!-- 案例代码 -->
        <script id="code">
            let scene = ThingOrigin.addScene("mouseLine", document.getElementById("mouseLine"));
            //加载模型
            let modelUUID = null;
            ThingOrigin.model.initFileModel("gltf", '../../../static/three/examplesModel/Parrot.glb', {
                scale: [1, 1, 1],
                rotation: [0, 30, 0],
                position: [0, 30, 0]
            }).then((model) => {
                modelUUID = model.uuid;
                scene.add(model);
                //初始化
                scene.effect.initModelClip(model,"x", 3);
            })


            //更新
            function updateClip() {
                scene.effect.updateModelClip(Math.random() * 50);
            }
            //删除
            function deleteClip() {
                scene.effect.deleteModelClip();
            }
        </script>
        <!-- 其他 -->
        <script>
            document.getElementById("codeShow").innerHTML = document.getElementById("code").innerHTML;
        </script>
    </body>
</html>
